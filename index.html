<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <title>Что съел?</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <meta name="apple-mobile-web-app-title" content="Дневник питания">
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #f2f2f7;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            padding: 12px;
            box-sizing: border-box;
        }

        /* Основной контейнер для еды */
        .food-container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 12px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
        }

        /* Отдельный контейнер для веса */
        .weight-container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 12px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #1c1c1e;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin: 0 0 12px 0;
            font-size: 16px;
            border-radius: 14px;
            border: 1.5px solid #e5e5ea;
            background: #f9f9fc;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #007AFF;
            background: white;
        }

        /* Стили для кнопок */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .saveBtn {
            background: linear-gradient(135deg, #66ea6d, #025a31);
            color: white;
            box-shadow: 0 8px 20px rgba(52, 199, 89, 0.3);
        }

        .statsBtn {
            background:  linear-gradient(135deg, #043a7a, #5874f3);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        .sendBtn {
            background: #AF52DE;
            color: white;
            box-shadow: 0 8px 20px rgba(175, 82, 222, 0.3);
        }

        /* Карточки питания */
        .nutrition-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 16px 0;
            width: 100%;
        }

        .calorie-card {
            background: linear-gradient(135deg, #ff8a5c, #fb3a0a);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(255, 107, 74, 0.3);
            color: white;
        }

        .calorie-value {
            font-size: 32px;
            font-weight: bold;
            line-height: 1;
        }

        .calorie-unit {
            font-size: 18px;
            opacity: 0.9;
        }

        .macros-card {
            background: linear-gradient(135deg, #337e79, #57dfd7);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            color: white;
        }

        .macro-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 18px;
        }

        .macro-emoji {
            font-size: 20px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .macro-value {
            font-weight: bold;
            font-size: 20px;
        }

        /* Стили для блока веса */
        .weight-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .weight-display p {
            margin: 0 0 8px 0;
            font-size: 16px;
            opacity: 0.9;
        }

        .weight-display span {
            font-size: 36px;
            font-weight: bold;
        }

        .weight-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .weight-input-group input {
            flex: 1;
            margin: 0;
        }

        .weight-input-group button {
            width: auto;
            margin: 0;
            padding: 14px 24px;
            white-space: nowrap;
        }

        /* Модальное окно */
        #statsModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
        }

        #statsModal .modalContent {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        #closeBtn {
            background: #8e8e93;
            color: white;
            margin-top: 16px;
            box-shadow: none;
        }

        #closeBtn:active {
            background: #636366;
        }

        /* Адаптация */
        @media (max-width: 400px) {
            .macro-item {
                font-size: 16px;
            }
            .macro-value {
                font-size: 18px;
            }
            .calorie-value {
                font-size: 28px;
            }
            .weight-display span {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>
<!-- Контейнер для еды -->
<div class="food-container">
    <h2>🥘 Что съел?</h2>

    <select id="product"></select>
    <input id="weightFood" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Вес продукта (г)">

    <div class="nutrition-cards">
        <div class="calorie-card">
            <span class="calorie-value" id="kcalValue">0</span>
            <span class="calorie-unit">ккал</span>
        </div>
        <div class="macros-card">
            <div class="macro-item">
                <span class="macro-emoji">🥩</span>
                <span class="macro-value" id="proteinValue">0</span>
            </div>
            <div class="macro-item">
                <span class="macro-emoji">🧈</span>
                <span class="macro-value" id="fatValue">0</span>
            </div>
            <div class="macro-item">
                <span class="macro-emoji">🍞</span>
                <span class="macro-value" id="carbsValue">0</span>
            </div>
        </div>
    </div>

    <button class="saveBtn" id="addBtn">
         Записать еду <span>📝</span>
    </button>
    <button class="statsBtn" id="statsBtn">
         Статистика <span>📊</span>
    </button>
</div>

<!-- Отдельный контейнер для веса -->
<div class="weight-container">
    <h2>⚖️ Контроль веса</h2>

    <div class="weight-display">
        <p>Текущий вес</p>
        <span id="currentWeight">—</span> <span style="font-size: 22px;">кг</span>
    </div>

    <div class="weight-input-group">
        <input id="weightHuman" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Новый вес (кг)">
        <button class="sendBtn" id="setWeightBtn">💾</button>
    </div>
</div>

<div id="statsModal">
    <div class="modalContent">
        <h2>📈 Статистика</h2>
        <div id="chart_div" style="width:100%; height:400px;"></div>
        <button id="closeBtn">Закрыть</button>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
