<!DOCTYPE html>

<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f2f2f7;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      min-height: 100dvh;

      padding: 16px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin-top: 20px;

      background: white;
      padding: 24px;

      border-radius: 16px;

      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .saveBtn {
      background: #34C759;
      color: white;
    }

    .statsBtn {
      background: #007AFF;
      color: white;
    }

    #statsModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      /* полупрозрачный фон */
      justify-content: center;
      align-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    #statsModal .modalContent {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      max-height: 90vh;
      overflow-y: auto;
      /* скролл, если много контента */
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Что съел?</h2>
    <select id="product"></select>
    <input id="weight" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Вес (г)">
    <button class="saveBtn" onclick="add()">Добавить</button>
    <button class="statsBtn" onclick="showStats()">Статистика</button>
  </div>

  <div id="statsModal">
    <div class="modalContent">
      <h2>Статистика</h2>
      <div id="chart_div" style="width:100%; height:400px;"></div>
      <button onclick="closeStats()">Закрыть</button>
    </div>
  </div>

  <script>

    async function loadProducts() {

      try {
        // Получаем данные с Apps Script API
        const response = await fetch("https://script.google.com/macros/s/AKfycbyO9pkgjCIx3hV7_ZpBlu5E7i6NfO0Gl9WuB-8vqNkF4TadG81tOlHm7Jp8LnR6NPqSdA/exec");
        const products = await response.json();

        // Находим <select> на странице
        const select = document.getElementById("product");
        select.innerHTML = ""; // очищаем старые опции

        // Заполняем <select>
        products.forEach(p => {
          const option = document.createElement("option");
          option.value = p;
          option.text = p;
          select.appendChild(option);
        });

      } catch (error) {
        console.error("Ошибка загрузки продуктов:", error);
      }
    }

    function add() {

      const product = document.getElementById("product").value;
      const weight = document.getElementById("weight").value;

      if (!weight) {
        alert("Введите вес");
        return;
      }

      const data = {
        product: product,
        weight: weight
      }
      fetch("https://script.google.com/macros/s/AKfycbyO9pkgjCIx3hV7_ZpBlu5E7i6NfO0Gl9WuB-8vqNkF4TadG81tOlHm7Jp8LnR6NPqSdA/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      });

      document.getElementById("weight").value = "";
    }

    function showStats() {
      document.getElementById("statsModal").style.display = "flex";
      google.charts.setOnLoadCallback(drawChart);
    }

    function closeStats() {
      document.getElementById("statsModal").style.display = "none";
    }

    function drawChart(statsData) {
      // const dataArray = [['Дата', 'Нужно', 'Употреблено']];
      // statsData.forEach(item => {
      //   dataArray.push([item.date, item.need, item.consumed]);
      // });

      const data = google.visualization.arrayToDataTable([
        ['Дата', 'Нужно', 'Употреблено'],
        ['07/08', 100, 90],
        ['08/08', 100, 110],
        ['09/08', 100, 60]
      ]);

      const options = {
        title: 'Тренд "Нужно" vs "Употреблено"',
        width: '100%',
        height: 400,
        legend: { position: 'bottom' },
        vAxis: { title: 'Калории' },
        hAxis: { title: 'Дата' },
        colors: ['#34C759', '#007AFF']
      };

      const chart = new google.visualization.LineChart(document.getElementById('chart_div'));
      chart.draw(data, options);
    }

    // function drawChart() {
    //   const data = google.visualization.arrayToDataTable([
    //     ['Тип', 'Количество'],
    //     ['SQL', 10],
    //     ['SOQL', 15]
    //   ]);
    //   const options = {
    //     title: 'Статистика запросов'
    //   };
    //   const chart = new google.visualization.PieChart(
    //     document.getElementById('chart_div')
    //   );
    //   chart.draw(data, options);
    // }
    google.charts.load('current', { 'packages': ['corechart'] });
    loadProducts();

  </script>

</body>

</html>
