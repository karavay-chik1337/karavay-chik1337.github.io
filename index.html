<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f2f7;
  margin:0;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  min-height:100dvh;

  padding:16px;
  box-sizing:border-box;
}

.container{
  width:100%;
  max-width:420px;
  margin-top:20px;

  background:white;
  padding:24px;

  border-radius:16px;

  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  text-align:center;
}

select,input{
  width:100%;
  padding:14px;
  margin:10px 0;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.saveBtn{
  background:#34C759;
  color:white;
}

.statsBtn{
  background:#007AFF;
  color:white;
}

#statsModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  padding:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Что съел?</h2>

<select id="product"></select>

<input id="weight" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Вес (г)">

<button class="saveBtn" onclick="add()">Добавить</button>

<button class="statsBtn" onclick="showStats()">Статистика</button>

</div>

<div id="statsModal">

<h2>Статистика</h2>

<div id="chart_div" style="width:100%; height:400px;"></div>

<button onclick="closeStats()">Закрыть</button>

</div>

<script>

async function loadProducts(){

  try {
      // Получаем данные с Apps Script API
      const response = await fetch("https://script.google.com/macros/s/AKfycbyO9pkgjCIx3hV7_ZpBlu5E7i6NfO0Gl9WuB-8vqNkF4TadG81tOlHm7Jp8LnR6NPqSdA/exec");
      const products = await response.json();

      // Находим <select> на странице
      const select = document.getElementById("product");
      select.innerHTML = ""; // очищаем старые опции

      // Заполняем <select>
      products.forEach(p => {
        const option = document.createElement("option");
        option.value = p;
        option.text = p;
        select.appendChild(option);
      });

    } catch (error) {
      console.error("Ошибка загрузки продуктов:", error);
    }
}

function add(){

  const product=document.getElementById("product").value;
  const weight=document.getElementById("weight").value;

  if(!weight){
    alert("Введите вес");
    return;
  }

  const data={
    product:product,
    weight:weight
  }
  fetch("https://script.google.com/macros/s/AKfycbyO9pkgjCIx3hV7_ZpBlu5E7i6NfO0Gl9WuB-8vqNkF4TadG81tOlHm7Jp8LnR6NPqSdA/exec",{
    method: "POST",
    mode:"no-cors",
    body: JSON.stringify(data)
  });

  document.getElementById("weight").value = "";
}

// function showStats(){

//   document.getElementById("statsModal").style.display="block";

//   google.script.run.withSuccessHandler(drawChart).getStats();

// }


// function closeStats(){
//   document.getElementById("statsModal").style.display="none";
// }


loadProducts();

</script>

</body>

</html>
